services:
  db:
    image: postgres:15-alpine
    container_name: sociocircle-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Prem@123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sociocircle-backend
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Prem@123
      - JWT_SECRET=MySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      - JWT_EXPIRATION=86400000
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
