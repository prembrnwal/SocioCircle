services:
  db:
    image: postgres:15-alpine
    container_name: sociocircle-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Prem@123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sociocircle-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sociocircle-backend
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-postgres}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Prem@123}
      - JWT_SECRET=${JWT_SECRET:-MySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    ports:
      - "9090:9090"
    networks:
      - sociocircle-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/SocioCircle/SocioCircle
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:9090/api}
        - VITE_AUTH_BASE_URL=${VITE_AUTH_BASE_URL:-http://localhost:9090}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-http://localhost:9090/ws-chat}
    container_name: sociocircle-frontend
    ports:
      - "80:80"
    networks:
      - sociocircle-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sociocircle-network:
    driver: bridge
